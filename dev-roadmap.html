/* ─── PROGRESS HOOK ─── */
const STORAGE_KEY = 'dev-roadmap-v1';
function useProgress() {
  const [done, setDone] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? new Set(JSON.parse(s)) : new Set(); }
    catch { return new Set(); }
  });
  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...done])); } catch {} }, [done]);
  const toggle = useCallback(id => setDone(prev => { const n = new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; }), []);
  const isDone = useCallback(id => done.has(id), [done]);
  return { toggle, isDone, done };
}

/* ─── STEP ITEM ─── */
function StepItem({ step, isDone, onToggle, trackColor }) {
  const [expanded, setExpanded] = useState(false);
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      onClick={()=>setExpanded(e=>!e)}
      style={{
        borderBottom:'1px solid #141414', padding:'10px 16px',
        cursor:'pointer', background:hovered?'#111':'transparent',
        transition:'background .15s', opacity:isDone?.55:1,
      }}>
      <div style={{display:'flex',alignItems:'flex-start',gap:'10px'}}>
        <button
          onClick={e=>{e.stopPropagation();onToggle(step.id)}}
          style={{
            width:18,height:18,borderRadius:4,flexShrink:0,marginTop:1,
            border:`1.5px solid ${isDone?trackColor:'#444'}`,
            background:isDone?trackColor:'transparent',
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s',
          }}>
          {isDone && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="#000" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{
            fontSize:13,fontWeight:500,lineHeight:1.4,
            color:isDone?'var(--text3)':'var(--text)',
            textDecoration:isDone?'line-through':'none',
          }}>{step.title}</div>
          {expanded && (
            <div style={{
              fontSize:12,color:'var(--text2)',lineHeight:1.7,marginTop:8,
              fontFamily:'var(--fc)',borderLeft:`2px solid ${trackColor}`,paddingLeft:10,
            }}>{step.detail}</div>
          )}
        </div>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
          style={{flexShrink:0,marginTop:2,transition:'transform .2s',transform:expanded?'rotate(180deg)':'none'}}>
          <path d="M2 4l4 4 4-4" stroke="var(--text3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

/* ─── TRACK CARD ─── */
function TrackCard({ trackData, isDone, onToggle }) {
  const track = TRACKS[trackData.track];
  const steps = trackData.steps;
  const doneCount = steps.filter(s=>isDone(s.id)).length;
  const pct = Math.round(doneCount/steps.length*100);
  const [collapsed, setCollapsed] = useState(false);
  return (
    <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',background:'#0c0c0c'}}>
      <button onClick={()=>setCollapsed(c=>!c)} style={{
        width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 16px',
        background:'#111',border:'none',borderBottom:'1px solid #1a1a1a',cursor:'pointer',textAlign:'left',
      }}>
        <span style={{fontSize:14,fontWeight:700,color:track.color,flex:1}}>{track.label}</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:56,height:3,background:'#222',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${pct}%`,background:track.color,transition:'width .4s'}}/>
          </div>
          <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',minWidth:32}}>{doneCount}/{steps.length}</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{transition:'transform .2s',transform:collapsed?'rotate(-90deg)':'none'}}>
            <path d="M2 4l4 4 4-4" stroke="var(--text3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </button>
      {!collapsed && steps.map(step=>(
        <StepItem key={step.id} step={step} isDone={isDone(step.id)} onToggle={onToggle} trackColor={track.color}/>
      ))}
    </div>
  );
}

/* ─── OVERVIEW ─── */

        </h1>
        <p style={{fontSize:16,color:'var(--text2)',lineHeight:1.7,maxWidth:560}}>
          Roadmap có thể theo dõi, click đánh dấu từng bước. Mỗi phase có mục tiêu rõ ràng — không học lan man, không bỏ sót thứ quan trọng. Tiến độ lưu tự động.
        </p>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:'3rem'}}>
        {[
          {v:'3',l:'phases',c:'var(--accent)'},
          {v:`${total}`,l:'bước học',c:'var(--react)'},
          {v:`${doneCount}`,l:'hoàn thành',c:'var(--project)'},
          {v:`${pct}%`,l:'tiến độ',c:'var(--lc)'},
        ].map(({v,l,c})=>(
          <div key={l} style={{border:'1px solid var(--border)',borderRadius:8,padding:'1.25rem',background:'#0e0e0e'}}>
            <div style={{fontFamily:'var(--fm)',fontSize:28,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',marginTop:6,textTransform:'uppercase',letterSpacing:'.08em'}}>{l}</div>
          </div>

      {/* Phase cards */}
      <div style={{marginBottom:'3rem'}}>
        <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'1rem'}}>— phases</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {PHASES.map(phase=>{

                  background:'#0e0e0e',border:'1px solid var(--border)',borderRadius:8,
                  padding:'1.5rem',textAlign:'left',cursor:'pointer',transition:'all .2s',
                }}>
                <div style={{fontFamily:'var(--fm)',fontSize:11,color:phase.color,letterSpacing:'.1em',marginBottom:8}}>{phase.sublabel}</div>
                <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:4}}>{phase.desc}</div>
                <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.5,marginBottom:'1rem'}}>{phase.goal}</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>

                    <div style={{height:'100%',width:`${pp}%`,background:phase.color,transition:'width .4s'}}/>

        <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'1rem'}}>— nguyên tắc vàng</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          {RULES.map((r,i)=>(
            <div key={i} style={{border:'1px solid var(--border)',borderRadius:8,padding:'1.25rem',background:'#0e0e0e',display:'flex',gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>{r.emoji}</span>
              <div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{r.title}</div>
                <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{r.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

  );

/* ─── PHASE VIEW ─── */
function PhaseView({ phase, isDone, onToggle }) {
  const allSteps = phase.tracks.flatMap(t=>t.steps);
  const doneCount = allSteps.filter(s=>isDone(s.id)).length;
  const pct = Math.round(doneCount/allSteps.length*100);
  return (
    <section className="fade-in" style={{padding:'3rem 2rem',maxWidth:1100,margin:'0 auto'}}>
      <div style={{marginBottom:'2rem'}}>
        <div style={{fontFamily:'var(--fm)',fontSize:11,color:phase.color,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:8}}>{phase.sublabel}</div>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:'1rem',flexWrap:'wrap'}}>
          <div>
            <h2 style={{fontSize:32,fontWeight:800,marginBottom:4}}>{phase.label} — {phase.desc}</h2>
            <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.6,maxWidth:600}}>{phase.goal}</p>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontFamily:'var(--fm)',fontSize:40,fontWeight:700,color:phase.color,lineHeight:1}}>{pct}%</div>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',marginTop:2}}>{doneCount}/{allSteps.length} bước</div>
          </div>
        </div>
        <div style={{marginTop:'1rem',height:4,background:'#1a1a1a',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:phase.color,transition:'width .5s ease'}}/>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12}}>
        {phase.tracks.map(trackData=>(
          <TrackCard key={trackData.track} trackData={trackData} isDone={isDone} onToggle={onToggle}/>
        ))}
      </div>
    </section>
  );
}

/* ─── SCHEDULE ─── */
function Schedule() {
  const [active, setActive] = useState(0);
  const day = SCHEDULE[active];
  return (
    <section className="fade-in" style={{padding:'3rem 2rem',maxWidth:900,margin:'0 auto'}}>
      <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:8}}>// lịch học cố định</div>
      <h2 style={{fontSize:32,fontWeight:800,marginBottom:'2rem'}}>Lịch hàng ngày</h2>
      <div style={{display:'flex',gap:8,marginBottom:'1.5rem',borderBottom:'1px solid #1a1a1a',paddingBottom:'1rem',flexWrap:'wrap'}}>
        {SCHEDULE.map((d,i)=>(
          <button key={i} onClick={()=>setActive(i)} style={{
            fontFamily:'var(--fm)',fontSize:12,padding:'6px 16px',borderRadius:4,cursor:'pointer',transition:'all .2s',
            border:active===i?`1px solid ${d.color}`:'1px solid #222',
            background:active===i?`${d.color}18`:'transparent',
            color:active===i?d.color:'var(--text2)',fontWeight:active===i?700:400,
          }}>{d.day}</button>
        ))}
      </div>
      <div style={{border:'1px solid #1a1a1a',borderRadius:8,padding:'0 1.25rem',background:'#0c0c0c',marginBottom:'1.5rem'}}>
        {day.slots.map((slot,i)=>(
          <div key={i} style={{display:'flex',gap:'1.5rem',padding:'16px 0',borderBottom:i<day.slots.length-1?'1px solid #141414':'none'}}>
            <div style={{width:120,flexShrink:0}}>
              <div style={{fontFamily:'var(--fm)',fontSize:11,color:slot.color,fontWeight:700,lineHeight:1.4}}>{slot.time}</div>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{slot.label}</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{slot.desc}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{padding:'1.25rem',border:'1px solid var(--border)',borderRadius:8,background:'#0e0e0e',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem',textAlign:'center'}}>
        {[
          {l:'Backend',t:'~7.5h/tuần',c:'var(--backend)'},
          {l:'LeetCode',t:'~5h/tuần',c:'var(--lc)'},
          {l:'Project',t:'~4h/tuần',c:'var(--project)'},
        ].map(item=>(
          <div key={item.l}>
            <div style={{fontFamily:'var(--fm)',fontSize:20,fontWeight:700,color:item.c}}>{item.t}</div>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--text3)',marginTop:4,textTransform:'uppercase'}}>{item.l}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ─── HEADER ─── */
function Header({ active, onNav, done }) {
  const allSteps = PHASES.flatMap(p=>p.tracks.flatMap(t=>t.steps));
  const total = allSteps.length;
  const doneCount = allSteps.filter(s=>done.has(s.id)).length;
  const pct = Math.round(doneCount/total*100);
  const navItems = [{id:'overview',l:'Overview'},{id:'p1',l:'Phase 1'},{id:'p2',l:'Phase 2'},{id:'p3',l:'Phase 3'},{id:'schedule',l:'Lịch'}];
  const [menuOpen, setMenuOpen] = useState(false);

  return (
    <header style={{
      borderBottom:'1px solid #1a1a1a',padding:'0 1.5rem',position:'sticky',top:0,zIndex:100,
      background:'rgba(10,10,10,0.96)',backdropFilter:'blur(12px)',
      display:'flex',alignItems:'center',justifyContent:'space-between',height:60,gap:16,
    }}>
      <div style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--accent)',letterSpacing:'.08em',fontWeight:700,display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',display:'inline-block',animation:'pulse 2s ease-in-out infinite'}}/>
        DEV_MAP
      </div>
      <nav style={{display:'flex',gap:2,flexWrap:'nowrap',overflow:'auto'}}>
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>onNav(item.id)} style={{
            fontFamily:'var(--fm)',fontSize:11,padding:'5px 10px',borderRadius:4,cursor:'pointer',transition:'all .2s',
            border:'1px solid transparent',whiteSpace:'nowrap',
            background:active===item.id?'var(--accent)':'transparent',
            color:active===item.id?'#000':'var(--text2)',
            fontWeight:active===item.id?700:400,
            borderColor:active===item.id?'var(--accent)':'transparent',
          }}>{item.l}</button>
        ))}
      </nav>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <div style={{width:60,height:3,background:'#222',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:'var(--accent)',transition:'width .4s'}}/>
        </div>
        <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--accent)',fontWeight:700,minWidth:32}}>{pct}%</span>
      </div>
    </header>
  );
}

/* ─── APP ─── */
function App() {
  const [activeSection, setActiveSection] = useState('overview');
  const { toggle, isDone, done } = useProgress();
  const mainRef = useRef(null);
  const SECTIONS = ['overview','p1','p2','p3','schedule'];

  const navigate = id => {
    setActiveSection(id);
    mainRef.current?.scrollTo({top:0,behavior:'smooth'});
  };

  const renderContent = () => {
    if (activeSection==='overview') return <Overview onNav={navigate} done={done}/>;
    if (activeSection==='schedule') return <Schedule/>;
    const phase = PHASES.find(p=>p.id===activeSection);
    if (phase) return <PhaseView phase={phase} isDone={isDone} onToggle={toggle}/>;
    return <Overview onNav={navigate} done={done}/>;
  };

  const idx = SECTIONS.indexOf(activeSection);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <Header active={activeSection} onNav={navigate} done={done}/>
      <main ref={mainRef} style={{flex:1,overflowY:'auto',background:'var(--bg)'}}>
        {renderContent()}

        {/* Bottom nav */}
        <div style={{
          borderTop:'1px solid #151515',padding:'1.5rem 2rem',
          display:'flex',justifyContent:'space-between',alignItems:'center',
          maxWidth:1100,margin:'0 auto',
        }}>
          <button onClick={()=>idx>0&&navigate(SECTIONS[idx-1])} disabled={idx===0}
            style={{
              fontFamily:'var(--fm)',fontSize:11,padding:'7px 14px',border:'1px solid #222',
              borderRadius:4,background:'transparent',cursor:idx===0?'not-allowed':'pointer',
              color:idx===0?'var(--text3)':'var(--text2)',transition:'all .2s',
            }}>← Trước</button>

          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {SECTIONS.map((id,i)=>(
              <div key={id} onClick={()=>navigate(id)} style={{
                height:6,borderRadius:3,cursor:'pointer',transition:'all .3s',
                width:id===activeSection?20:6,
                background:id===activeSection?'var(--accent)':'#333',
              }}/>
            ))}
          </div>

          <button onClick={()=>idx<SECTIONS.length-1&&navigate(SECTIONS[idx+1])} disabled={idx===SECTIONS.length-1}
            style={{
              fontFamily:'var(--fm)',fontSize:11,padding:'7px 14px',border:'1px solid #222',
              borderRadius:4,background:'transparent',cursor:idx===SECTIONS.length-1?'not-allowed':'pointer',
              color:idx===SECTIONS.length-1?'var(--text3)':'var(--text2)',transition:'all .2s',
            }}>Tiếp →</button>
        </div>
        <div style={{height:'2rem'}}/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
